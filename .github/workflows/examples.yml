name: examples
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-examples:
    name: linux-gcc-openblas-examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup RandBLAS dependencies (with LAPACK++)
        uses: ./.github/actions/setup-randblas-deps
        with:
          cc: gcc
          cxx: g++
          blas-backend: openblas
          install-lapackpp: "true"

      - name: build and install RandBLAS
        shell: bash
        run: |
          set -euxo pipefail
          cd ..
          mkdir RandBLAS-build
          cd RandBLAS-build
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -Dblaspp_DIR="${blaspp_DIR}" \
            -DRandom123_DIR="${Random123_DIR}" \
            -DCMAKE_INSTALL_PREFIX="$(pwd)/../RandBLAS-install" \
            "$(pwd)/../RandBLAS"
          make -j"$(nproc)" install

      - name: configure and build examples
        shell: bash
        working-directory: ${{ github.workspace }}/examples
        run: |
          set -euxo pipefail
          mkdir build
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(pwd)/../../../RandBLAS-install" \
            -Dblaspp_DIR="${blaspp_DIR}" \
            -Dlapackpp_DIR="${lapackpp_DIR}" \
            -DRandom123_DIR="${Random123_DIR}" \
            ..
          make -j"$(nproc)"
